<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GACOM - Game. Connect. Dominate. Africa's premier social gaming platform.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GACOM">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080808">
  <title>GACOM</title>

  <!-- Round favicon from Cloudinary -->
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dtchp470a/image/upload/c_fill,g_face,h_192,r_max,w_192/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtchp470a/image/upload/c_fill,g_face,h_192,r_max,w_192/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg">
  <link rel="manifest" href="manifest.json">

  <!-- FIX: Dark background prevents white flash while Flutter loads -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #080808;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Loading splash shown before Flutter boots */
    #gacom-splash {
      position: fixed;
      inset: 0;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #gacom-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #gacom-splash img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 48px rgba(232, 75, 0, 0.55);
      animation: splashPulse 1.8s ease-in-out infinite;
    }
    #gacom-splash .title {
      font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #F0F0F0;
      letter-spacing: 10px;
      margin-top: 20px;
    }
    #gacom-splash .tagline {
      font-family: 'Rajdhani', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #E84B00;
      letter-spacing: 4px;
      margin-top: 6px;
    }
    #gacom-splash .bar-wrap {
      width: 48px;
      height: 2px;
      background: #242424;
      border-radius: 2px;
      margin-top: 60px;
      overflow: hidden;
    }
    #gacom-splash .bar {
      height: 100%;
      background: #E84B00;
      border-radius: 2px;
      animation: splashBar 1.6s ease-in-out infinite;
    }
    @keyframes splashPulse {
      0%, 100% { box-shadow: 0 0 48px rgba(232,75,0,0.55); }
      50%       { box-shadow: 0 0 72px rgba(232,75,0,0.85); }
    }
    @keyframes splashBar {
      0%   { width: 0%;   margin-left: 0; }
      50%  { width: 100%; margin-left: 0; }
      100% { width: 0%;   margin-left: 100%; }
    }
  </style>

  <!-- Paystack Popup JS (for web payment) -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <script>
    // ── Round favicon via canvas ──────────────────────────────────────────────
    window.addEventListener('load', function () {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = 'https://res.cloudinary.com/dtchp470a/image/upload/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg';
      img.onload = function () {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.arc(32, 32, 32, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, 0, 0, 64, 64);
        const link = document.querySelector("link[rel='icon']") || document.createElement('link');
        link.type = 'image/png'; link.rel = 'icon'; link.href = canvas.toDataURL();
        document.head.appendChild(link);
      };
    });

    // ── Paystack Popup function called from Flutter via dart:js ──────────────
    // Flutter calls: window.paystackPay(publicKey, amountKobo, email, reference, callbackUrl)
    window.paystackPay = function(publicKey, amountKobo, email, reference, callbackUrl) {
      var handler = PaystackPop.setup({
        key: publicKey,
        email: email,
        amount: amountKobo,
        ref: reference,
        currency: 'NGN',
        channels: ['card', 'bank', 'ussd', 'qr', 'bank_transfer'],
        metadata: {
          custom_fields: [
            { display_name: 'Platform', variable_name: 'platform', value: 'GACOM' }
          ]
        },
        callback: function(response) {
          // Payment successful — notify Flutter
          if (window.flutter_inappwebview) {
            window.flutter_inappwebview.callHandler('paystackSuccess', response.reference);
          } else if (window._paystackSuccessCallback) {
            window._paystackSuccessCallback(response.reference);
          }
          // Redirect back to wallet page
          if (callbackUrl) {
            window.location.href = callbackUrl + '?ref=' + response.reference + '&status=success';
          }
        },
        onClose: function() {
          if (window._paystackCloseCallback) {
            window._paystackCloseCallback();
          }
        }
      });
      handler.openIframe();
    };

    // ── Hide splash once Flutter has rendered ────────────────────────────────
    window._gacomHideSplash = function() {
      var splash = document.getElementById('gacom-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 500);
      }
    };

    // Fallback: hide splash after 8 seconds even if Flutter callback never fires
    setTimeout(function() { window._gacomHideSplash && window._gacomHideSplash(); }, 8000);
  </script>
</head>
<body>
  <!-- Splash screen shown immediately — no white flash -->
  <div id="gacom-splash">
    <img
      src="https://res.cloudinary.com/dtchp470a/image/upload/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg"
      alt="GACOM"
      onerror="this.style.display='none'"
    />
    <div class="title">GACOM</div>
    <div class="tagline">GAME. CONNECT. DOMINATE.</div>
    <div class="bar-wrap"><div class="bar"></div></div>
  </div>

  <!-- Flutter bootstrap — defer keeps it non-blocking -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
