name: gacom
description: Gacom - Social Gaming Platform for Competitive Gamers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  supabase_flutter: ^2.3.4
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  video_player: ^2.8.3
  file_picker: ^8.0.3
  timeago: ^3.6.1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  font_awesome_flutter: ^10.7.0
  infinite_scroll_pagination: ^4.0.0
  flutter_staggered_grid_view: ^0.7.0
  equatable: ^2.0.5
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
