[build]
  command = "git clone https://github.com/flutter/flutter.git -b stable --depth 1 && flutter/bin/flutter config --enable-web && flutter/bin/flutter pub get && flutter/bin/flutter build web --release"
  publish = "build/web"

[build.environment]
  PATH = "/opt/build/repo/flutter/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200