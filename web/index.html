<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GACOM - Game. Connect. Dominate. Africa's premier social gaming platform.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GACOM">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#E84B00">
  <title>GACOM</title>

  <!-- Round favicon from Cloudinary -->
  <style>
    /* This SVG favicon clips the image into a circle */
  </style>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dtchp470a/image/upload/c_fill,g_face,h_192,r_max,w_192/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtchp470a/image/upload/c_fill,g_face,h_192,r_max,w_192/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg">

  <link rel="manifest" href="manifest.json">
  <script>
    // Generate a round favicon via canvas
    window.addEventListener('load', function () {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = 'https://res.cloudinary.com/dtchp470a/image/upload/v1775540390/WhatsApp_Image_2026-03-27_at_03.12.01_3_jxyhbj.jpg';
      img.onload = function () {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.arc(32, 32, 32, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, 0, 0, 64, 64);
        const link = document.querySelector("link[rel='icon']") || document.createElement('link');
        link.type = 'image/png';
        link.rel = 'icon';
        link.href = canvas.toDataURL();
        document.head.appendChild(link);
      };
    });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
