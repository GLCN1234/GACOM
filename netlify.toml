[build]
  command = "bash build.sh"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "stable"
  PYTHON_VERSION = "3.8"

# ── CORS / COOP / COEP headers ────────────────────────────────────────────────
# Required for Flutter Web video_player iframe and SharedArrayBuffer.
# Without these, browser throws ERR_BLOCKED_BY_RESPONSE.NotSameOrigin
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "cross-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, apikey, x-client-info"

[[redirects]]
  from = "/supabase-proxy/*"
  to = "https://rxccipqvyrcfpsadgpzp.supabase.co/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
